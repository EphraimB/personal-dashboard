  #   security_opt:
  #     - seccomp:unconfined
  #     - apparmor:unconfined
  #   # Performance commands optimized for MariaDB on low-resource environments:
  #   # - Reduced buffer pool size (512M is sufficient for most home libraries)
  #   # - Connection limits reduced to save RAM overhead
  #   command: >
  #     --innodb-buffer-pool-size=512M
  #     --transaction-isolation=READ-COMMITTED
  #     --character-set-server=utf8mb4
  #     --collation-server=utf8mb4_unicode_ci
  #     --max-connections=100
  #   environment:
  #     MYSQL_ROOT_PASSWORD: "${MARIADB_ROOT_PASSWORD}"
  #     MYSQL_DATABASE: "${PHOTOPRISM_DATABASE_NAME:-photoprism}"
  #     MYSQL_USER: "${PHOTOPRISM_DATABASE_USER:-photoprism}"
  #     MYSQL_PASSWORD: "${PHOTOPRISM_DATABASE_PASSWORD}"
  #   volumes:
  #     - "./database:/var/lib/mysql"
  #   healthcheck:
  #     test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${PHOTOPRISM_DATABASE_USER:-photoprism}", "-p${PHOTOPRISM_DATABASE_PASSWORD}"]
